<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#fb8500"/></marker>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Architecture Overview</text>
  
  <!-- Inputs -->
  <rect x="30" y="65" width="140" height="50" rx="8" fill="#1a1e2e" stroke="#fb8500" stroke-width="1.5"/>
  <text x="100" y="85" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#fb8500" text-anchor="middle">💬 NL Question</text>
  <text x="100" y="103" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">"Show all users..."</text>

  <rect x="30" y="125" width="140" height="50" rx="8" fill="#1a1e2e" stroke="#fb8500" stroke-width="1.5"/>
  <text x="100" y="145" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#fb8500" text-anchor="middle">📄 SQL Schema</text>
  <text x="100" y="163" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">CREATE TABLE...</text>

  <line x1="170" y1="150" x2="210" y2="150" stroke="#fb8500" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Schema Parser -->
  <rect x="215" y="125" width="120" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="275" y="147" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">🔍 Schema Parser</text>
  <text x="275" y="163" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Extract tables</text>

  <line x1="335" y1="150" x2="375" y2="150" stroke="#fb8500" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Visualizer -->
  <rect x="380" y="125" width="120" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="440" y="147" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">📊 Visualizer</text>
  <text x="440" y="163" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">ASCII schema view</text>

  <line x1="500" y1="150" x2="540" y2="150" stroke="#fb8500" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Prompt Builder -->
  <rect x="545" y="65" width="120" height="50" rx="8" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="605" y="87" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">🔨 Prompt Builder</text>
  <text x="605" y="103" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Schema + question</text>

  <line x1="170" y1="90" x2="545" y2="90" stroke="#fb8500" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="150" x2="605" y2="115" stroke="#fb8500" stroke-width="1" marker-end="url(#arrowhead)"/>

  <line x1="605" y1="115" x2="605" y2="165" stroke="#fb8500" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- LLM -->
  <rect x="530" y="170" width="170" height="60" rx="10" fill="#1a1e2e" stroke="#fb8500" stroke-width="2"/>
  <text x="615" y="197" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#fb8500" text-anchor="middle">🤖 Ollama LLM</text>
  <text x="615" y="217" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">SQL generation</text>

  <line x1="530" y1="200" x2="470" y2="260" stroke="#fb8500" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Outputs -->
  <rect x="80" y="265" width="160" height="55" rx="10" fill="#1a1e2e" stroke="#fb8500" stroke-width="1.5"/>
  <text x="160" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#fb8500" text-anchor="middle">📝 SQL Query</text>
  <text x="160" y="308" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">With explanation</text>

  <rect x="280" y="265" width="160" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">⚡ Optimizer</text>
  <text x="360" y="308" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Performance tips</text>

  <rect x="480" y="265" width="160" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="560" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">📚 History</text>
  <text x="560" y="308" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Query tracking</text>

  <line x1="400" y1="265" x2="240" y2="265" stroke="#fb8500" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="240" y1="292" x2="280" y2="292" stroke="#fb8500" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="292" x2="480" y2="292" stroke="#fb8500" stroke-width="1" marker-end="url(#arrowhead)"/>

  <rect x="30" y="350" width="740" height="35" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="400" y="373" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">🔒 100% Local • Multi-Dialect (PostgreSQL, MySQL, SQLite) • Schema Visualization • Query History</text>
</svg>
